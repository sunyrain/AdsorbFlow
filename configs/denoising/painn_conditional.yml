
trainer: adsorbdiff.trainers.sde_denoising_trainer.DenoisingTrainer

dataset:
  - src:  train_allE
  #- src: train_split
  #- src: train_split
    normalize_labels: False
  - src: val_split

logger:
  name: wandb
  project: ads_COM_diff

task:
  dataset: lmdb
  train_on_free_atoms: True
  eval_on_free_atoms: True
  relaxation_steps: 300
  relaxation_fmax: 0.01
  relax_dataset:
        src: val_nonrelaxed_update
        #src: train_split
        #src: relax_opt
        #src: val_split
  relax_opt:
        maxstep: 0.04
        memory: 50
        damping: 1.0
        alpha: 70.0
        #traj_dir: relax_opt
        traj_dir: relax_opt
  primary_metric: loss
hide_eval_progressbar: False

model:
  name: adsorbdiff.models.painn.painn_denoising.PaiNN
  hidden_channels: 512
  num_layers: 6
  num_rbf: 128
  cutoff: 12.0
  max_neighbors: 50
  scale_file: configs/scaling_factors/painn_nb6_scaling_factors.pt
  regress_forces: True
  direct_forces: True
  use_pbc: True
  so3_denoising: True
  energy_encoding: "scalar"

optim:
  batch_size:                   48        # 6
  eval_batch_size:              48         # 6
  grad_accumulation_steps:      1         # gradient accumulation: effective batch size = `grad_accumulation_steps` * `batch_size` * (num of GPUs)
  load_balancing: atoms
  num_workers: 4
  lr_initial:                   1.e-4     # [0.0002, 0.0004], eSCN uses 0.0008 for batch size 96

  optimizer: AdamW
  optimizer_params:
    weight_decay: 0.001
  scheduler: LambdaLR
  scheduler_params:
    lambda_type: cosine
    warmup_factor: 0.2 #0.2
    warmup_epochs: 4 #0.5
    lr_min_factor: 0.01         #
  # scheduler: ReduceLROnPlateau
  # scheduler_params:
  #   mode: min
  #   factor: 0.8
  #   patience: 10

  max_epochs: 100000
  force_coefficient: 100
  energy_coefficient: 1
  clip_grad_norm: 100
  ema_decay: 0.999
  loss_energy: mae
  loss_force: l2mae

  # for denoising positions
  use_denoising_pos:            True
  denoising_pos_params:
    prob:                       1      # probability to switch between denoising positions and S2EF
    fixed_noise_std:            False
    num_steps:                  100
    ads_std_low:                0.1      # lowest standard deviation of Gaussian noise for each xyz component
    ads_std_high:               10
    rot_std_low:               0.01
    rot_std_high:              1.55
    free_std_low:            0.01
    free_std_high:           0.1
    sample_low_forces:         True
    only_langevin:             True
  denoising_pos_coefficient:    1
