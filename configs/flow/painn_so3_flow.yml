trainer: adsorbdiff.trainers.meanflow_trainer.MeanFlowTrainer

dataset:
  - src: train_split
    normalize_labels: False
  - src: val_split
    normalize_labels: False

logger:
  name: wandb
  project: ads_COM_diff

task:
  dataset: lmdb
  train_on_free_atoms: True
  eval_on_free_atoms: True
  relaxation_steps: 300
  relaxation_fmax: 0.01
  relax_dataset:
        src: val_nonrelaxed_update
        #src: train_split
        #src: relax_opt
        #src: val_split
  relax_opt:
        maxstep: 0.04
        memory: 50
        damping: 1.0
        alpha: 70.0
        #traj_dir: relax_opt
        traj_dir: relax_opt
  primary_metric: loss
hide_eval_progressbar: False

model:
  name: adsorbdiff.models.painn.painn_denoising.PaiNN
  hidden_channels: 512
  num_layers: 6
  num_rbf: 128
  cutoff: 12.0
  max_neighbors: 50
  scale_file: configs/scaling_factors/painn_nb6_scaling_factors.pt
  regress_forces: True
  direct_forces: True
  use_pbc: True
  so3_denoising: True

optim:
  batch_size:                   4        # 6
  eval_batch_size:              4         # 6
  grad_accumulation_steps:      1         # gradient accumulation: effective batch size = `grad_accumulation_steps` * `batch_size` * (num of GPUs)
  load_balancing: atoms
  num_workers: 4
  lr_initial:                   0.0002   # [0.0002, 0.0004], eSCN uses 0.0008 for batch size 96

  optimizer: AdamW
  optimizer_params:
    weight_decay: 0.001
  scheduler: CosineAnnealingLR
  T_max: 100
  eta_min: 0.000001

  patience: 3
  max_epochs: 100
  force_coefficient: 100
  energy_coefficient: 1
  clip_grad_norm: 100
  ema_decay: 0.999
  loss_energy: mae
  loss_force: l2mae


  flow:
    type: fm
    path: rectified
    time_sampl: uniform
    tr_sigma: 2.0
    rot_sigma: 1.0
