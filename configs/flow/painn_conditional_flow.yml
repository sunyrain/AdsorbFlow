trainer: adsorbdiff.trainers.meanflow_trainer.MeanFlowTrainer

dataset:
  - src:  train_split
  #- src: train_split
  #- src: train_split
    normalize_labels: False
  - src: val_split
    normalize_labels: False

logger:
  name: wandb
  project: ads_COM_diff

task:
  dataset: lmdb
  train_on_free_atoms: True
  eval_on_free_atoms: True
  relaxation_steps: 100
  relaxation_fmax: 0.01
  relax_dataset:
        src: val_nonrelaxed_update
        #src: train_split
        #src: relax_opt
        #src: val_split
  relax_opt:
        maxstep: 0.04
        memory: 50
        damping: 1.0
        alpha: 70.0
        #traj_dir: relax_opt
        traj_dir: relax_opt
  primary_metric: loss
hide_eval_progressbar: False

model:
  name: adsorbdiff.models.painn.painn_denoising.PaiNN
  hidden_channels: 512
  num_layers: 6
  num_rbf: 128
  cutoff: 12.0
  max_neighbors: 50
  scale_file: configs/scaling_factors/painn_nb6_scaling_factors.pt
  regress_forces: True
  direct_forces: True
  use_pbc: True
  so3_denoising: True
  energy_encoding: "scalar"
  flow_head_activation: tanh
  flow_head_scale: 5.0

optim:
  batch_size:                   16        # 6
  eval_batch_size:              16         # 6
  grad_accumulation_steps:      1         # gradient accumulation: effective batch size = `grad_accumulation_steps` * `batch_size` * (num of GPUs)
  load_balancing: atoms
  num_workers: 2
  lr_initial:                   0.00015     # [0.0002, 0.0004], eSCN uses 0.0008 for batch size 96

  optimizer: AdamW
  optimizer_params:
    weight_decay: 0.001
  scheduler: StepLR
  # warmup_steps: 2
  # warmup_factor: 0.2
  step_size: 5
  gamma: 0.99

  max_epochs: 10000
  force_coefficient: 100
  energy_coefficient: 1
  clip_grad_norm: 10
  ema_decay: 0.999
  loss_energy: mae
  loss_force: l2mae
  p_cfg: 0.25

  checkpoint_every_epoch: 50
  checkpoint_every: -1

  flow:
    nan_weight_debug: false
    type: fm
    fm_regression: velocity
    path: rectified
    time_sampl: uniform
    tr_sigma: 3
    allow_z: True
    tr_sigma_z_scale: 0.3
    rot_sigma: 1
    tr_clip: 20               # Translation clip
    rot_clip: 5               # Rotation clip
    grad_norm_guard: 5000000  # Gradient norm guard
    write_every: 10
    output_clip:
      translation: 40
      rotation: 10
