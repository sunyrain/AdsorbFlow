trainer: adsorbdiff.trainers.meanflow_trainer.MeanFlowTrainer

dataset:
  - src:  /root/autodl-tmp/AdsorbFlow/train_split
  #- src: /home/jovyan/shared-scratch/adeesh/data/oc20_dense/lmdbs_train_subsplits/train
  #- src: /home/jovyan/shared-scratch/adeesh/data/oc20_dense/lmdbs/train_oc20dense_rs_overfit
    normalize_labels: False
  - src: /root/autodl-tmp/AdsorbFlow/val_split
    normalize_labels: False

logger:
  name: wandb
  project: ads_COM_diff

task:
  dataset: lmdb
  train_on_free_atoms: True
  eval_on_free_atoms: True
  relaxation_steps: 100
  relaxation_fmax: 0.01
  relax_dataset: 
        src: /root/autodl-tmp/AdsorbFlow/val_nonrelaxed_update
        #src: /home/jovyan/shared-scratch/adeesh/data/oc20_dense/lmdbs_corr/train_oc20dense_rs
        #src: /home/jovyan/shared-scratch/adeesh/denoising/com_denoising/com-xy_std0.01-10_numstep50x10_lr1.e-4_allcorr/final_struct_lmdb
        #src: /home/jovyan/shared-scratch/adeesh/data/oc20_dense/lmdbs_train_subsplits/val
  relax_opt:
        maxstep: 0.04
        memory: 50
        damping: 1.0
        alpha: 70.0
        #traj_dir: /home/jovyan/shared-scratch/adeesh/denoising/com_sde/bysigma_lmdbcorr_std0.1-10_numstep100_sample1
        traj_dir: /root/autodl-tmp/AdsorbFlow/relax_opt
  primary_metric: loss
hide_eval_progressbar: False

model:
  name: adsorbdiff.models.painn.painn_denoising.PaiNN
  hidden_channels: 512
  num_layers: 6
  num_rbf: 128
  cutoff: 12.0
  max_neighbors: 50
  scale_file: configs/scaling_factors/painn_nb6_scaling_factors.pt
  regress_forces: True
  direct_forces: True
  use_pbc: True
  so3_denoising: True
  energy_encoding: "scalar"
  flow_head_activation: tanh
  flow_head_scale: 5.0

optim:
  batch_size:                   16        # 6
  eval_batch_size:              16         # 6
  grad_accumulation_steps:      1         # gradient accumulation: effective batch size = `grad_accumulation_steps` * `batch_size` * (num of GPUs)
  load_balancing: atoms
  num_workers: 2
  lr_initial:                   0.00015     # [0.0002, 0.0004], eSCN uses 0.0008 for batch size 96

  optimizer: AdamW
  optimizer_params:
    weight_decay: 0.001
  scheduler: StepLR
  # warmup_steps: 2
  # warmup_factor: 0.2
  step_size: 5
  gamma: 0.99

  max_epochs: 10000
  force_coefficient: 100
  energy_coefficient: 1
  clip_grad_norm: 10
  ema_decay: 0.999
  loss_energy: mae
  loss_force: l2mae
  p_cfg: 0.25        # ← 关键：cfg 强度
  
  checkpoint_every_epoch: 50   # 每 20 个 epoch 存一次 epoch_XXX.pt
  checkpoint_every: -1        # 禁用基于 step 的频繁保存 (checkpoint.pt 会在每个 epoch 结束时自动更新)

  flow:
    nan_weight_debug: false  
    type: fm                  # ← 关键：FM
    fm_regression: velocity # 或 clean_endpoint / delta_clean
    path: rectified           # 先用直线/测地插值
    time_sampl: uniform       # 或 cosine
    tr_sigma: 3         # XY 噪声尺度（按数据再调）
    allow_z: True    # 是否允许 Z 方向平移
    tr_sigma_z_scale: 0.3 # Z 轴噪声缩放因子 (1.0 = 与 XY 各向同性)
    rot_sigma: 1           # 轴角噪声尺度（弧度）
    tr_clip: 20               # Translation clip
    rot_clip: 5               # Rotation clip
    grad_norm_guard: 5000000  # Gradient norm guard
    write_every: 10           # 每隔多少个 epoch 写一次 traj
    output_clip:
      translation: 40
      rotation: 10